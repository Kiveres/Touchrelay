name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # кнопка "Run workflow" вручную

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3   # лучше использовать эту action
        # gradle-version можно убрать, если в проекте есть gradle/wrapper/gradle-wrapper.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease   # лучше использовать ./gradlew вместо gradle

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TouchRelay-APK
          path: app/build/outputs/apk/release/app-release.apk   # путь почти всегда такой
          retention-days: 30